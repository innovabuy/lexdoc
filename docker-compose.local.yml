version: '3.8'

# ===========================================
# LexDoc - Docker Compose for Local Development
# Usage: docker compose -f docker-compose.local.yml up -d
# ===========================================

services:
  # ===========================================
  # PostgreSQL Database
  # ===========================================
  postgres:
    image: postgres:16-alpine
    container_name: lexdoc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lexdoc_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lexdoc_secure_password}
      POSTGRES_DB: ${POSTGRES_DB:-lexdoc_production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lexdoc_user} -d ${POSTGRES_DB:-lexdoc_production}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lexdoc-network

  # ===========================================
  # MinIO Object Storage
  # ===========================================
  minio:
    image: minio/minio:latest
    container_name: lexdoc-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    ports:
      - "9002:9000"
      - "9003:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 10s
    networks:
      - lexdoc-network

  # ===========================================
  # Backend API (Node.js/Express)
  # ===========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lexdoc-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-lexdoc_user}:${POSTGRES_PASSWORD:-lexdoc_secure_password}@postgres:5432/${POSTGRES_DB:-lexdoc_production}?schema=public
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production-min-32-chars}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-in-production-32-chars}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-dev-32-character-encryption-key!}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_BUCKET_DOCUMENTS: ${MINIO_BUCKET_DOCUMENTS:-lexdoc-documents}
      MINIO_BUCKET_TEMPLATES: ${MINIO_BUCKET_TEMPLATES:-lexdoc-templates}
      CORS_ORIGINS: http://localhost:5173,http://localhost:8081,http://localhost
      FRONTEND_URL: http://localhost:8081
      BACKEND_URL: http://localhost:3005
    ports:
      - "3005:3000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - lexdoc-network

  # ===========================================
  # Frontend (React/Nginx)
  # ===========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3005
    container_name: lexdoc-frontend
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - lexdoc-network

  # ===========================================
  # Database Migrations
  # ===========================================
  migrations:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lexdoc-migrations
    command: sh -c "npx prisma migrate deploy"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-lexdoc_user}:${POSTGRES_PASSWORD:-lexdoc_secure_password}@postgres:5432/${POSTGRES_DB:-lexdoc_production}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - lexdoc-network

networks:
  lexdoc-network:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
