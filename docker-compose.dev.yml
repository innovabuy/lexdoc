version: '3.8'

services:
  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: lexdoc-dev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lexdoc_user
      POSTGRES_PASSWORD: lexdoc_dev_password_2026
      POSTGRES_DB: lexdoc_dev
    ports:
      - "5434:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lexdoc_user -d lexdoc_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 512M

  # MinIO (S3-compatible storage)
  minio:
    image: minio/minio:latest
    container_name: lexdoc-dev-minio
    restart: unless-stopped
    command: server /data --console-address ":9002"
    environment:
      MINIO_ROOT_USER: lexdoc_minio_dev
      MINIO_ROOT_PASSWORD: lexdoc_minio_dev_secret_2026
    ports:
      - "9003:9000"
      - "9004:9002"
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # MailHog (email testing)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: lexdoc-dev-mailhog
    restart: unless-stopped
    ports:
      - "1026:1025"
      - "8026:8025"
    deploy:
      resources:
        limits:
          memory: 128M

networks:
  default:
    name: lexdoc-dev-network
