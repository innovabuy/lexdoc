<!DOCTYPE html>
<html>
<head><style>body{font-family:Arial,sans-serif;}</style></head>
<body>
  <h2>Rappel : Document en attente de signature</h2>
  <p>Bonjour {{signerName}},</p>
  <p>Ceci est le rappel n{{reminderNumber}} concernant le document suivant :</p>
  <p><strong>{{documentName}}</strong></p>
  <p><a href="{{signatureUrl}}" style="background:#f59e0b;color:white;padding:12px 24px;text-decoration:none;border-radius:8px;display:inline-block;">Signer maintenant</a></p>
</body>
</html>
