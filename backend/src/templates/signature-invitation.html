<!DOCTYPE html>
<html>
<head><style>body{font-family:Arial,sans-serif;}</style></head>
<body>
  <h2>Document en attente de signature</h2>
  <p>Bonjour {{signerName}},</p>
  <p>Un document attend votre signature electronique :</p>
  <p><strong>{{documentName}}</strong></p>
  <p><a href="{{signatureUrl}}" style="background:#0066ff;color:white;padding:12px 24px;text-decoration:none;border-radius:8px;display:inline-block;">Signer maintenant</a></p>
  <p>Date limite : {{deadline}}</p>
</body>
</html>
